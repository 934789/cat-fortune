<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="lt-body" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#ff8a4a"/>
      <stop offset="40%" stop-color="#e02018"/>
      <stop offset="100%" stop-color="#5a0a0e"/>
    </radialGradient>
    
  <linearGradient id="lt-trim" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffe97a"/>
    <stop offset="50%" stop-color="#b97411"/>
    <stop offset="100%" stop-color="#4a2a05"/>
  </linearGradient>
  </defs>
  <!-- top cap -->
  <rect x="86" y="20" width="28" height="6" fill="url(#lt-trim)"/>
  <path d="M88 26 L112 26 L108 36 L92 36 Z" fill="url(#lt-trim)" stroke="#5a2a05" stroke-width="0.8"/>
  <!-- string up -->
  <line x1="100" y1="14" x2="100" y2="20" stroke="#5a2a05" stroke-width="2"/>
  <!-- body -->
  <ellipse cx="100" cy="90" rx="62" ry="60" fill="url(#lt-body)" stroke="#5a0a0e" stroke-width="1.5"/>
  <!-- ribs -->
  
    <ellipse cx="100" cy="90" rx="24" ry="60" fill="none" stroke="#5a0a0e" stroke-width="0.8" opacity="0.4"/>
  
    <ellipse cx="100" cy="90" rx="42" ry="60" fill="none" stroke="#5a0a0e" stroke-width="0.8" opacity="0.4"/>
  
    <ellipse cx="100" cy="90" rx="60" ry="60" fill="none" stroke="#5a0a0e" stroke-width="0.8" opacity="0.4"/>
  
    <ellipse cx="100" cy="90" rx="42" ry="60" fill="none" stroke="#5a0a0e" stroke-width="0.8" opacity="0.4"/>
  
    <ellipse cx="100" cy="90" rx="24" ry="60" fill="none" stroke="#5a0a0e" stroke-width="0.8" opacity="0.4"/>
  
  <!-- top and bottom plates -->
  <ellipse cx="100" cy="36" rx="32" ry="6" fill="url(#lt-trim)" stroke="#5a2a05" stroke-width="0.8"/>
  <ellipse cx="100" cy="144" rx="32" ry="6" fill="url(#lt-trim)" stroke="#5a2a05" stroke-width="0.8"/>
  <!-- highlight -->
  <ellipse cx="78" cy="70" rx="14" ry="22" fill="#fff7d6" opacity="0.4"/>
  <!-- gold character placeholder -->
  <circle cx="100" cy="90" r="20" fill="none" stroke="#ffd23f" stroke-width="1.5" opacity="0.85"/>
  <path d="M92 80 L92 100 M108 80 L108 100 M92 90 L108 90" stroke="#ffd23f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- tassel -->
  <rect x="96" y="150" width="8" height="6" fill="url(#lt-trim)"/>
  <path d="M88 156 Q88 184 80 188" stroke="#ffd23f" stroke-width="2" fill="none"/>
  <path d="M100 156 Q100 188 100 192" stroke="#ffd23f" stroke-width="2" fill="none"/>
  <path d="M112 156 Q112 184 120 188" stroke="#ffd23f" stroke-width="2" fill="none"/>
</svg>