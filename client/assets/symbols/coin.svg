<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="yb-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2a6"/>
      <stop offset="35%" stop-color="#ffd23f"/>
      <stop offset="80%" stop-color="#a86610"/>
      <stop offset="100%" stop-color="#5a2a05"/>
    </linearGradient>
    <linearGradient id="yb-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="50%" stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#a86610"/>
    </linearGradient>
    <radialGradient id="yb-hole" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#3a1a05"/>
      <stop offset="100%" stop-color="#7a4a08"/>
    </radialGradient>
  </defs>
  <!-- main boat shape -->
  <path d="M28 130 Q26 100 50 92 Q100 86 150 92 Q174 100 172 130 Q170 152 100 154 Q30 152 28 130 Z"
        fill="url(#yb-body)" stroke="#5a2a05" stroke-width="1.5"/>
  <!-- top cylinder (the protruding center) -->
  <ellipse cx="100" cy="86" rx="40" ry="16" fill="url(#yb-top)" stroke="#7a4a08" stroke-width="1"/>
  <!-- inner well -->
  <ellipse cx="100" cy="84" rx="28" ry="10" fill="url(#yb-hole)"/>
  <ellipse cx="100" cy="82" rx="28" ry="6" fill="#1a0608" opacity="0.6"/>
  <!-- specular -->
  <path d="M48 110 Q52 100 70 98" stroke="#fff7d6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M80 124 Q100 120 130 124" stroke="#fff7d6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- base shadow line -->
  <path d="M40 140 Q100 150 160 140" stroke="#3a1a05" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>